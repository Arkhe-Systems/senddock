services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: senddock
      POSTGRES_PASSWORD: senddock_dev
      POSTGRES_DB: senddock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  